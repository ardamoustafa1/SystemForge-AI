name: Release Artifacts

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize GHCR image names
        id: images
        shell: bash
        run: |
          REPOSITORY="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${REPOSITORY}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${REPOSITORY}-frontend" >> "$GITHUB_OUTPUT"

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.backend }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push backend
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: runtime
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.frontend }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push frontend
        id: frontend-build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container images with GitHub OIDC
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ steps.images.outputs.backend }}@${{ steps.backend-build.outputs.digest }}"
          cosign sign --yes "${{ steps.images.outputs.frontend }}@${{ steps.frontend-build.outputs.digest }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint and package Helm chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm lint ops/helm/systemforge
          helm package ops/helm/systemforge \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate source SBOM and checksums
        run: |
          syft dir:. -o spdx-json=dist/systemforge-source.spdx.json
          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tgz
            dist/*.spdx.json
            dist/SHA256SUMS
