name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pyre-check

      - name: Backend lint
        run: ruff check backend/app backend/tests

      - name: Backend typecheck
        run: pyre --noninteractive check

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests (Docker)
        run: docker compose run --rm backend-test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend infrastructure
        run: |
          docker compose -f ../docker-compose.yml up -d postgres redis
          docker compose -f ../docker-compose.yml run --rm backend-migrate || true
          docker compose -f ../docker-compose.yml up -d backend backend-generation-worker backend-delivery-worker backend-outbox-worker backend-notification-worker backend-export-worker
          
          echo "Waiting for backend to be healthy..."
          timeout 60 bash -c 'until curl -s http://localhost:8000/api/health; do sleep 2; done'
          echo "Backend is ready!"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true

  security-scans:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
