name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Docker build from scratch
        run: docker compose build --no-cache

  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend quality tools
        run: |
          pip install uv
          uv pip install --system ruff
      - name: Backend lint (Ruff)
        run: ruff check backend/app backend/tests

  backend-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend quality tools
        run: |
          pip install uv
          uv pip install --system -e "backend[dev]"
      - name: Backend typecheck (Pyre)
        run: pyre --noninteractive check

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests (Docker)
        run: docker compose run --rm backend-test

  frontend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: ESLint
        run: npm run lint

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Frontend unit tests
        run: npm run test

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start backend infrastructure
        run: |
          docker compose -f ../docker-compose.yml up -d postgres redis
          docker compose -f ../docker-compose.yml run --rm backend-migrate
          docker compose -f ../docker-compose.yml up -d backend backend-generation-worker backend-delivery-worker backend-outbox-worker backend-notification-worker backend-export-worker
          
          echo "Waiting for backend to be healthy..."
          timeout 60 bash -c 'until curl -s http://localhost:8000/api/health; do sleep 2; done'
          echo "Backend is ready!"
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true

  security-scans:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Python dependency audit
        run: |
          pip install uv pip-audit
          uv pip install --system -e backend[dev]
          pip-audit
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
