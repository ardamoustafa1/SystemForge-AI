name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests (Docker)
        run: docker compose run --rm backend-test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend infrastructure
        run: |
          docker compose -f ../docker-compose.yml up -d postgres redis
          docker compose -f ../docker-compose.yml run --rm backend-migrate || true
          docker compose -f ../docker-compose.yml up -d backend backend-generation-worker backend-delivery-worker backend-outbox-worker backend-notification-worker
          
          echo "Waiting for backend to be healthy..."
          timeout 60 bash -c 'until curl -s http://localhost:8000/api/health; do sleep 2; done'
          echo "Backend is ready!"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true
