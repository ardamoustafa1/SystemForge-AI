services:
  api:
    image: ghcr.io/example/marketplace-api:0.1.0
    environment:
      DATABASE_URL: postgresql+psycopg://marketplace:marketplace@postgres:5432/marketplace
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  fulfillment-worker:
    image: ghcr.io/example/marketplace-api:0.1.0
    command: ["python", "-m", "app.workers.fulfillment"]
    environment:
      DATABASE_URL: postgresql+psycopg://marketplace:marketplace@postgres:5432/marketplace
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
