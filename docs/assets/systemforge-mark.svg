<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SystemForge AI mark</title>
  <desc id="desc">A glowing hexagonal architecture mark.</desc>
  <rect width="320" height="320" rx="72" fill="#050505"/>
  <g filter="url(#glow)">
