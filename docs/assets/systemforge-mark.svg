    <path d="M160 88L222 123V197L160 232L98 197V123L160 88Z" fill="#07070A" fill-opacity="0.9"/>
    <path d="M160 119L198 141V179L160 201L122 179V141L160 119Z" fill="white" fill-opacity="0.96"/>
