apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: systemforge-ingress
  namespace: systemforge
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.systemforge.dev
      secretName: systemforge-tls
  rules:
    - host: app.systemforge.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
