apiVersion: apps/v1
kind: Deployment
metadata:
  name: systemforge-backend
  labels:
    app: systemforge
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: systemforge
      component: backend
  template:
    metadata:
      labels:
        app: systemforge
        component: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/ardamoustafa1/systemforge-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: systemforge-config
        - secretRef:
            name: systemforge-secrets
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: systemforge-backend
spec:
  selector:
    app: systemforge
    component: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
