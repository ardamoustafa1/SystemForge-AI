apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "systemforge.fullname" . }}-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - "sh"
            - "-c"
            - "until pg_isready -h {{ include "systemforge.fullname" . }}-postgres -p 5432 -U {{ .Values.postgres.user }}; do echo waiting for database; sleep 2; done;"
      containers:
        - name: migration
          image: "{{ .Values.image.repository }}/{{ .Values.image.backend }}:{{ .Values.image.tag }}"
          command: ["sh", "-lc", "/app/scripts/migrate.sh"]
          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg://{{ .Values.postgres.user }}:{{ required "A valid .Values.postgres.password is required" .Values.postgres.password }}@{{ include "systemforge.fullname" . }}-postgres:5432/{{ .Values.postgres.db }}"
      restartPolicy: Never
  backoffLimit: 3
