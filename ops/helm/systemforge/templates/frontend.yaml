apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "systemforge.fullname" . }}-frontend
  labels:
    app: systemforge-frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: systemforge-frontend
  template:
    metadata:
      labels:
        app: systemforge-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}/{{ .Values.image.frontend }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.env.frontendPublicApiUrl | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "systemforge.fullname" . }}-frontend
  labels:
    app: systemforge-frontend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.frontendPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: systemforge-frontend
