{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "systemforge.fullname" . }}-redis
  labels:
    app: systemforge-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: systemforge-redis
  template:
    metadata:
      labels:
        app: systemforge-redis
    spec:
      containers:
        - name: redis
          image: "redis:7-alpine"
          ports:
            - containerPort: 6379
              name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "systemforge.fullname" . }}-redis
  labels:
    app: systemforge-redis
spec:
  ports:
    - port: 6379
      targetPort: redis
      name: redis
  selector:
    app: systemforge-redis
{{- end }}
