{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "systemforge.fullname" . }}-postgres
  labels:
    app: systemforge-postgres
spec:
  serviceName: {{ include "systemforge.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: systemforge-postgres
  template:
    metadata:
      labels:
        app: systemforge-postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:16-alpine"
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ required "A valid .Values.postgres.password is required" .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "systemforge.fullname" . }}-postgres
  labels:
    app: systemforge-postgres
spec:
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    app: systemforge-postgres
{{- end }}
