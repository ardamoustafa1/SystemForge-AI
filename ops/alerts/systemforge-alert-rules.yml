groups:
  - name: systemforge-slo
    interval: 30s
    rules:
      - alert: GenerationLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(http_request_latency_ms_bucket{path=~".*/designs.*"}[10m])) by (le)) > 15000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Generation p95 latency exceeded 15s"
      - alert: ExportQueueLagGrowing
        expr: (sum(rate(worker_events_total{worker="export",event="queued"}[10m])) - sum(rate(worker_events_total{worker="export",event="processed"}[10m]))) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Export queue lag is increasing"
      - alert: AbuseSpikeDetected
        expr: sum(rate(abuse_counter_high_severity[5m])) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High severity abuse events detected"

