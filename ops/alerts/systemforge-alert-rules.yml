groups:
- name: SystemForgeAlerts
  rules:
  - alert: HighErrorRate
    expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "High API Error Rate"
      description: "API 5xx error rate is above 5% for the last 2 minutes."
      
  - alert: WorkerQueueLag
    expr: sum(redis_stream_pending_messages) > 1000
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Worker Queue Depth"
      description: "More than 1000 pending messages in Redis streams."

  - alert: DatabaseConnectionsHigh
    expr: sum(pg_stat_activity_count) > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High DB connection count"
      description: "PostgreSQL active connections are near the default limit."
